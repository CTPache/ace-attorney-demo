<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Attorney Demo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/investigation.css">
    <link rel="stylesheet" href="css/move.css">
</head>

<body>
    <div id="main-wrapper">
        <div id="game-container">
            <div id="background" class="layer"></div>
            <img id="character" class="layer" alt="" src="/">
            <div id="foreground" class="layer"></div>
            <div id="flash-overlay" class="layer"></div>
            <button id="autoplay-indicator" type="button" aria-label="Toggle Auto Play"
                title="Toggle Auto Play (A)">Auto</button>
            <div id="life-bar-container" class="hidden">
                <div id="life-bar-body">
                    <div id="life-bar-fill"></div>
                    <div id="life-bar-penalty"></div>
                </div>
            </div>
            <div id="evidence-popup" class="hidden">
                <div id="popup-icon-container">
                    <img id="popup-icon" src="/" alt="Evidence Icon">
                </div>
                <div id="popup-info">
                    <div id="popup-name"></div>
                    <div id="popup-desc"></div>
                </div>
            </div>
            <div id="textbox-container">
                <div id="name-tag">Name</div>
                <div id="text-content">Text</div>
            </div>
        </div>
        <div id="bottom-screen">
            <div id="bottom-top-bar">
                <button id="court-record-btn">Court Record</button>
                <button id="config-btn">Config</button>
            </div>
            <div id="bottom-main-window">
                <button id="advance-btn">▶</button>
                <div id="config-menu" class="hidden">
                    <div class="config-card">
                        <h3>Configuration</h3>
                        <div class="config-row config-speed-row">
                            <span>Auto Speed</span>
                            <div class="config-speed-options">
                                <label><input type="radio" name="auto-speed" value="slow"> Slow</label>
                                <label><input type="radio" name="auto-speed" value="normal" checked> Normal</label>
                                <label><input type="radio" name="auto-speed" value="fast"> Fast</label>
                            </div>
                        </div>
                        <label class="config-row">
                            <span>Language</span>
                            <select id="config-language-select">
                                <option value="EN">English</option>
                                <option value="ES">Español</option>
                                <option value="JP">日本語</option>
                            </select>
                        </label>
                        <button id="config-history-btn">View History</button>
                        <button id="config-close-btn">Close</button>
                    </div>
                </div>
                <div id="history-menu" class="hidden">
                    <div class="history-card">
                        <h3>History</h3>
                        <div id="history-list"></div>
                        <button id="history-close-btn">Close</button>
                    </div>
                </div>
                <div id="investigation-menu" class="hidden">
                    <button id="btn-examine" class="inv-btn">Examine</button>
                    <button id="btn-move" class="inv-btn">Move</button>
                    <button id="btn-talk" class="inv-btn">Talk</button>
                    <button id="btn-present" class="inv-btn">Present</button>
                </div>
                <div id="move-menu" class="hidden">
                    <div id="move-preview-container">
                        <img id="move-preview-image" src="/" alt="Location Preview">
                    </div>
                    <div id="move-list">
                        <!-- Move buttons will be injected here -->
                    </div>
                    <button id="btn-move-back" class="back-btn">Back</button>
                </div>
                <div id="investigation-panel" class="hidden">
                    <img id="investigation-bg" src="/" alt="Investigation Background">
                    <svg id="investigation-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
                    <div id="investigation-cursor-h" class="cursor-line"></div>
                    <div id="investigation-cursor-v" class="cursor-line"></div>
                    <div id="investigation-cursor-box">
                        <div id="cursor-check">✓</div>
                    </div>
                    <button id="btn-investigation-back" class="back-btn">Back</button>
                </div>
                <div id="topic-menu" class="hidden">
                    <button id="btn-topic-back" class="back-btn">Back</button>
                </div>
                <div id="evidence-container" class="hidden">
                    <div id="cr-tabs">
                        <div class="cr-tab active">Evidence</div>
                        <div class="cr-tab">Profiles</div>
                    </div>
                    <div id="evidence-name-display"></div>
                    <div id="evidence-grid"></div>
                    <button id="btn-evidence-back" class="back-btn">Back</button>
                    <div id="evidence-details" class="hidden">
                        <div id="evidence-details-top">
                            <button id="evidence-prev-btn" class="detail-nav-btn">◀</button>
                            <div id="evidence-icon-container">
                                <img id="evidence-icon-large" src="/" alt="Evidence Icon">
                            </div>
                            <div id="evidence-info-right">
                                <h3 id="evidence-title">dummy</h3>
                                <div id="evidence-data-box">dummy data</div>
                            </div>
                            <button id="evidence-next-btn" class="detail-nav-btn">▶</button>
                        </div>
                        <div id="evidence-description-box">
                            <p id="evidence-description">dummy description</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/DOMGlobals.js"></script>
    <script src="js/globals.js"></script>
    <script src="js/media.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/script-actions.js"></script>
    <script src="js/text-renderer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/investigation.js"></script>
    <script src="js/court-record.js"></script>
    <script src="js/topics.js"></script>
    <script src="js/lifebar.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
